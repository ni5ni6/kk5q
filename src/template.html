<!DOCTYPE html>
<html lang="sr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
  <meta property="og:title" content="{{title}}">
  <meta property="og:type" content="website">
  {{ogImage}}
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <style>
    .cover { width: 100%; height: 280px; object-fit: cover; object-position: center 40%; display: block; }
    .page-wrap { padding: 2rem; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      padding: .15rem .55rem;
      border-radius: 1rem;
      font-size: .85em;
      white-space: nowrap;
    }
    .badge-default, .badge-gray { background: #e3e3e3; color: #787878; }
    .badge-brown   { background: #f0e0d6; color: #9b6f5e; }
    .badge-orange  { background: #fde8d7; color: #c97228; }
    .badge-yellow  { background: #fef3c0; color: #a07810; }
    .badge-green   { background: #d7f0d7; color: #3a8a3a; }
    .badge-blue    { background: #d7e8f8; color: #2f6fa8; }
    .badge-purple  { background: #ece0f8; color: #7c45a8; }
    .badge-pink    { background: #fce0f0; color: #c44d8a; }
    .badge-red     { background: #fde0de; color: #c43c37; }
    .back-nav { margin-bottom: 1rem; }
    .back-nav a { color: var(--pico-muted-color); text-decoration: none; font-size: .9rem; }
    .back-nav a:hover { color: var(--pico-color); }
  </style>
</head>
<body>
  {{cover}}
  <div class="page-wrap">
    <div class="container back-nav"><a href="/">ПОЧЕТНА СТРАНА</a></div>
    <main class="container">{{content}}</main>
  </div>
</body>
</html>
